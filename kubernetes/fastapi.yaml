apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: product-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: product-review-ai:latest
          imagePullPolicy: Never
          command: ["uvicorn", "main_deploy:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: product-review
spec:
  selector:
    app: fastapi
  ports:
    - port: 8001
      targetPort: 8001
