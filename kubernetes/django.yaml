apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
  namespace: product-review
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready!"
        - name: collectstatic
          image: product-review-backend:latest
          imagePullPolicy: Never
          command: ["python", "manage.py", "collectstatic", "--noinput"]
          volumeMounts:
            - name: env-file
              mountPath: /app/.env
              subPath: .env
            - name: staticfiles
              mountPath: /app/staticfiles
      containers:
        - name: django
          image: product-review-backend:latest
          imagePullPolicy: Never
          command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: env-file
              mountPath: /app/.env
              subPath: .env
            - name: staticfiles
              mountPath: /app/staticfiles
          readinessProbe:
            httpGet:
              path: /admin/login/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: staticfiles
              mountPath: /app/staticfiles
      volumes:
        - name: env-file
          configMap:
            name: app-config
        - name: staticfiles
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: product-review
spec:
  selector:
    app: django
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: product-review
spec:
  type: NodePort
  selector:
    app: django
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080