name: Monorepo CI (Django + FastAPI + Celery + Redis + Postgres)

on:
  push:
    branches: ["main", "backend/dev", "ai-server/dev"]
  pull_request:
    branches: ["main", "backend/dev", "ai-server/dev"]

jobs:
  # -------------------------------------------------------
  # JOB 1. Backend 테스트 (backend/dev, main 브랜치)
  # -------------------------------------------------------
  app-tests:
    name: App Tests
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/backend/dev' ||
      github.base_ref == 'main' ||
      github.base_ref == 'backend/dev'

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_DB: product_db
          POSTGRES_USER: product_user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U product_user -d product_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SECRET_KEY: ci-secret-key
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost"
      CSRF_TRUSTED_ORIGINS: "http://127.0.0.1:8000,http://localhost:8000"

      DB_NAME: product_db
      DB_USER: product_user
      DB_PASSWORD: password
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

      REDIS_URL: redis://127.0.0.1:6379/0
      FASTAPI_BASE_URL: http://127.0.0.1:8001

      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket, time

          for i in range(30):
              try:
                  with socket.create_connection(("127.0.0.1", 5432), timeout=2):
                      print("PostgreSQL is ready")
                      break
              except OSError:
                  print(f"Waiting for PostgreSQL... {i+1}/30")
                  time.sleep(2)
          else:
              raise SystemExit("PostgreSQL did not become ready in time")
          PY

      - name: Install PostgreSQL client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Enable pgvector extension
        env:
          PGPASSWORD: password
        run: |
          psql \
            -h 127.0.0.1 \
            -U product_user \
            -d product_db \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Wait for Redis
        run: |
          python - <<'PY'
          import socket, time

          for i in range(30):
              try:
                  with socket.create_connection(("127.0.0.1", 6379), timeout=2):
                      print("Redis is ready")
                      break
              except OSError:
                  print(f"Waiting for Redis... {i+1}/30")
                  time.sleep(2)
          else:
              raise SystemExit("Redis did not become ready in time")
          PY

      - name: Django system check
        working-directory: backend
        run: |
          python manage.py check

      - name: Run migrations
        working-directory: backend
        run: |
          python manage.py migrate --noinput

      - name: Check missing migrations
        working-directory: backend
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Run Django tests
        working-directory: backend
        run: |
          python manage.py test

      - name: Celery smoke import
        working-directory: backend
        run: |
          python - <<'PY'
          import os
          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "mysite.settings")

          import django
          django.setup()

          from mysite.celery import app
          print("Celery app loaded:", app.main)
          PY

  # -------------------------------------------------------
  # JOB 2. AI Server 테스트 (ai-server/dev 브랜치만)
  # -------------------------------------------------------
  ai-server-tests:
    name: AI Server Tests
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/ai-server/dev' ||
      github.base_ref == 'ai-server/dev'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ai-server dependencies
        if: hashFiles('ai-server/requirements.txt') != ''
        working-directory: ai-server
        run: |
          pip install -r requirements.txt

      - name: FastAPI smoke import
        if: hashFiles('ai-server/requirements.txt') != ''
        working-directory: ai-server
        run: |
          python - <<'PY'
          import importlib

          module = importlib.import_module("main")
          print("FastAPI module imported:", module)
          PY

      - name: Build ai-server image
        if: hashFiles('ai-server/Dockerfile') != ''
        working-directory: ai-server
        run: |
          docker build -t product-review-ai:ci .

  # -------------------------------------------------------
  # JOB 3. Docker Build (backend)
  # -------------------------------------------------------
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: app-tests
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/backend/dev' ||
      github.base_ref == 'main' ||
      github.base_ref == 'backend/dev'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        working-directory: backend
        run: |
          docker build -t product-review-backend:ci .

  # -------------------------------------------------------
  # JOB 4. 통합 테스트 (main 머지 시, backend만)
  # -------------------------------------------------------
  integration-compose:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI .env file
        working-directory: backend
        run: |
          cat <<EOF > .env
          DJANGO_SECRET_KEY=ci-secret-key
          DJANGO_DEBUG=False
          DJANGO_ALLOWED_HOSTS=127.0.0.1,localhost
          CSRF_TRUSTED_ORIGINS=http://127.0.0.1:8000,http://localhost:8000
          DB_NAME=product_db
          DB_USER=product_user
          DB_PASSWORD=password
          DB_HOST=db
          DB_PORT=5432
          REDIS_URL=redis://redis:6379/0
          FASTAPI_BASE_URL=http://fastapi:8001
          SECRET_KEY=ci-secret-key
          EOF

      - name: Show docker compose config
        working-directory: backend
        run: |
          docker compose config

      - name: Start backend stack with docker compose
        working-directory: backend
        run: |
          docker compose up -d --build \
            db redis web celery

      - name: Wait for containers to initialize
        run: |
          python3 - <<'PY'
          import socket, time, sys

          services = [
              ("127.0.0.1", 8000, "Django"),
          ]

          for host, port, name in services:
              for i in range(60):
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          print(f"{name} is ready")
                          break
                  except OSError:
                      print(f"Waiting for {name}... {i+1}/60")
                      time.sleep(3)
              else:
                  print(f"{name} did not become ready in time")
                  sys.exit(1)
          PY

      - name: Show running containers
        working-directory: backend
        run: |
          docker compose ps

      - name: Backend health check
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:8000/admin/login/ || true)
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Django is ready"
              exit 0
            fi
            sleep 5
          done
          echo "Django did not respond in time"
          exit 1

      - name: Celery container check
        working-directory: backend
        run: |
          docker compose ps celery

      - name: Print logs if failed
        if: failure()
        working-directory: backend
        run: |
          docker compose logs --no-color

      - name: Shutdown containers
        if: always()
        working-directory: backend
        run: |
          docker compose down -v
