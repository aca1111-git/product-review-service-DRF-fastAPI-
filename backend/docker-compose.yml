version: "3.9"

services:
  db:
    image: postgres:16
    container_name: product_review_postgres
    restart: always
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - product_review_postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  web:
    build: .
    container_name: drf-web
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - app-network

  celery:
    build: .
    container_name: celery-worker
    command: celery -A mysite.celery:app worker --loglevel=info --pool=solo
    restart: always
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - web
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: redis-new
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

volumes:
  product_review_postgres_data:

networks:
  app-network:
    driver: bridge
